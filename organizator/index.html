<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizator - Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Organizator</h1>
    <p>Un presente organizado es un futuro seguro!</p>
  </header>

  <main>
<section aria-label="Agregar nueva tarea">
  <div class="task-input-container">
    <input type="text" class="task-input" placeholder="Escriba la tarea..." id="newTaskInput">
    <input type="text" class="task-input category-input" placeholder="Categoría (opcional)..." id="newCategoryInput">
    <button class="add-btn">Agregar</button>
  </div>
</section>


    <section aria-label="Lista de tarefas">
      <h2>Tareas</h2>

      <!-- Tarefa 1: Alta prioridade, não completa -->
      <article class="priority-high">
        <div class="task-header">
          <div class="task-checkbox">
            <input type="checkbox" id="task1" class="task-check-input">
            <label for="task1" class="task-check-label"></label>
          </div>
          <h3>Estudiar HTML e CSS</h3>
          <select class="priority-select">
            <option value="high" selected>Alta</option>
            <option value="medium">Media</option>
            <option value="low">Baja</option>
          </select>
          <span class="priority-badge">Alta</span>
          <button class="delete-btn" onclick="deleteTask(this)">×</button>
        </div>
        <p>Categoría: Estudios</p>
      </article>

      <!-- Tarefa 2: Media prioridade, completa -->
      <article class="priority-medium completed">
        <div class="task-header">
          <div class="task-checkbox">
            <input type="checkbox" id="task2" class="task-check-input" checked>
            <label for="task2" class="task-check-label"></label>
          </div>
          <h3>Hacer ejercicio</h3>
          <select class="priority-select">
            <option value="high">Alta</option>
            <option value="medium" selected>Media</option>
            <option value="low">Baja</option>
          </select>
          <span class="priority-badge">Media</span>
          <button class="delete-btn" onclick="deleteTask(this)">×</button>
        </div>
        <p>Categoría: Salud</p>
      </article>

      <!-- Tarefa 3: Baja prioridade, não completa -->
      <article class="priority-low">
        <div class="task-header">
          <div class="task-checkbox">
            <input type="checkbox" id="task3" class="task-check-input">
            <label for="task3" class="task-check-label"></label>
          </div>
          <h3>Lavar ropa</h3>
          <select class="priority-select">
            <option value="high">Alta</option>
            <option value="medium">Media</option>
            <option value="low" selected>Baja</option>
          </select>
          <span class="priority-badge">Baja</span>
          <button class="delete-btn" onclick="deleteTask(this)">×</button>
        </div>
        <p>Categoría: Casa</p>
      </article>

      <!-- Tarefa 4: Alta prioridade, completa -->
      <article class="priority-high completed">
        <div class="task-header">
          <div class="task-checkbox">
            <input type="checkbox" id="task4" class="task-check-input" checked>
            <label for="task4" class="task-check-label"></label>
          </div>
          <h3>Reunión equipo</h3>
          <select class="priority-select">
            <option value="high" selected>Alta</option>
            <option value="medium">Media</option>
            <option value="low">Baja</option>
          </select>
          <span class="priority-badge">Alta</span>
          <button class="delete-btn" onclick="deleteTask(this)">×</button>
        </div>
        <p>Categoría: Trabajo</p>
      </article>
    </section>
  </main>

  <aside>
    <h2>Filtros</h2>
    <div class="search-container">
  <input type="text" id="searchInput" placeholder="🔍 Buscar tareas...">
</div>

    <button class="filter-btn active" data-filter="all">Todas</button>
    <button class="filter-btn" data-filter="high">Alta Prioridade</button>
    <button class="filter-btn" data-filter="medium">Media Prioridade</button>
    <button class="filter-btn" data-filter="low">Baja Prioridade</button>

    <button class="filter-btn" data-filter="completed">Completadas</button>
  </aside>

  <script src="script.js"></script>
</body>
</html>
